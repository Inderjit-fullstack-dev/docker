version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dockerised_todo_sqlserver
    environment:
      - SA_PASSWORD=Strong!Passw0rd
      - ACCEPT_EULA=Y
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql
    networks:
      - todo-network

  redis:
    image: redis:7-alpine
    container_name: dockerised_todo_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "StrongRedisPass123!"]
    networks:
      - todo-network

  todoapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: dockerisedtodoapp:latest
    container_name: dockerised_todo_app
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=DockerisedTodoDb;User Id=sa;Password=Strong!Passw0rd;TrustServerCertificate=True;
      - Redis__Configuration=redis:6379,password=StrongRedisPass123!
    depends_on:
      - sqlserver
      - redis
    ports:
      - "5000:80"
    networks:
      - todo-network

volumes:
  sqlserverdata:

networks:
  todo-network:
    driver: bridge
